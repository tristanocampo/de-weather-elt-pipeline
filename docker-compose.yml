services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: weather_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.8.1-python3.11
    platform: linux/amd64
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/weather_db
    volumes:
      - ./.env:/opt/airflow/.env
      - ./dags:/opt/airflow/dags
      - ./local:/opt/airflow/local
      - ./data:/opt/airflow/data
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email tristangodwin.works@gmail.com"

  airflow:
    image: apache/airflow:2.8.1-python3.11
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/weather_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    volumes:
      - ./.env:/opt/airflow/.env
      - ./dags:/opt/airflow/dags
      - ./local:/opt/airflow/local
      - ./data:/opt/airflow/data
    depends_on:
      - postgres
    command: >
      bash -c "airflow webserver & airflow scheduler"

volumes:
  pgdata:
